services:
  - type: web
    name: ai-knowledge-assistant-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PROJECT_NAME
        value: AI Knowledge Assistant
      - key: APP_ENV
        value: production
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: ai-knowledge-assistant-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRES_MINUTES
        value: 30
      - key: JWT_REFRESH_TOKEN_EXPIRES_DAYS
        value: 7
      - key: UPLOAD_ROOT_DIR
        value: ./storage/uploads
      - key: MAX_UPLOAD_SIZE_BYTES
        value: 10485760
      - key: CHROMA_PERSIST_DIRECTORY
        value: ./storage/chroma
      - key: CHROMA_COLLECTION_NAME
        value: knowledge_chunks
      - key: EMBEDDING_MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: RAG_CHUNK_SIZE
        value: 500
      - key: RAG_CHUNK_OVERLAP
        value: 50
      - key: RAG_TOP_K
        value: 4
      - key: LLM_PROVIDER
        value: ollama
      - key: LLM_MODEL_NAME
        value: llama3
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: OLLAMA_DEFAULT_MODEL
        value: llama3
      - key: OLLAMA_KEEP_ALIVE
        value: 5m
      - key: BACKEND_CORS_ORIGINS
        value: https://your-frontend.vercel.app,https://your-custom-domain.com

databases:
  - name: ai-knowledge-assistant-db
    databaseName: ai_knowledge_assistant
    user: ai_knowledge_user
    plan: free
